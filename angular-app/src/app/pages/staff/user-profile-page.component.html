<div class="user-profile">
  <h2>Staff Profile</h2>

  <p class="info-message" *ngIf="infoMessage">{{ infoMessage }}</p>
  <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

  <form [formGroup]="profileForm" class="profile-form" *ngIf="!loading">
    <div class="row">
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>First name</mat-label>
        <input matInput formControlName="first_name" required />
      </mat-form-field>
      <mat-form-field appearance="outline" class="half-width">
        <mat-label>Last name</mat-label>
        <input matInput formControlName="last_name" required />
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" disabled />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Phone</mat-label>
      <input matInput formControlName="phone" />
    </mat-form-field>

    <h3>Change password</h3>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Current password</mat-label>
      <input matInput type="password" formControlName="current_password" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>New password</mat-label>
      <input matInput type="password" formControlName="new_password" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm new password</mat-label>
      <input matInput type="password" formControlName="confirm_password" />
    </mat-form-field>

    <div class="actions">
      <button mat-raised-button color="primary" type="button" (click)="saveProfile()" [disabled]="profileForm.invalid">Save profile</button>
    </div>
  </form>

  <p *ngIf="loading">Loading profile...</p>
</div>
