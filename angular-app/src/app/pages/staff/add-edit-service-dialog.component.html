<h2 mat-dialog-title>{{ isEdit ? 'Modifier le service' : 'Ajouter un service' }}</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="service-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nom</mat-label>
      <input matInput formControlName="name" required>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="half-width">
      <mat-label>Durée estimée (min)</mat-label>
      <input matInput type="number" formControlName="estimated_duration" min="1">
    </mat-form-field>

    <mat-form-field appearance="outline" class="half-width">
      <mat-label>Code</mat-label>
      <input matInput formControlName="code">
    </mat-form-field>

    <mat-slide-toggle formControlName="is_active" color="primary">Actif</mat-slide-toggle>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Annuler</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">{{ isEdit ? 'Enregistrer' : 'Ajouter' }}</button>
</mat-dialog-actions>
