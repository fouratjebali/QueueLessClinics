<div class="audit-logs-page">
  <h2>Audit Logs</h2>
  <div class="filters">
    <mat-form-field appearance="outline">
      <mat-label>Actor</mat-label>
      <input matInput [(ngModel)]="filterActor" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Action</mat-label>
      <input matInput [(ngModel)]="filterAction" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Clinic</mat-label>
      <mat-select [(ngModel)]="filterClinic">
        <mat-option value="">All</mat-option>
        <mat-option *ngFor="let c of clinics" [value]="c.id">{{ c.name }}</mat-option>
      </mat-select>
    </mat-form-field>
    <button mat-raised-button color="primary" (click)="loadLogs()">Apply</button>
  </div>

  <table mat-table [dataSource]="logs" class="table">
    <ng-container matColumnDef="created_at">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let l">{{ l.created_at | date:'short' }}</td>
    </ng-container>
    <ng-container matColumnDef="actor">
      <th mat-header-cell *matHeaderCellDef>Actor</th>
      <td mat-cell *matCellDef="let l">{{ l.actor_name || l.actor_email || 'System' }}</td>
    </ng-container>
    <ng-container matColumnDef="action_type">
      <th mat-header-cell *matHeaderCellDef>Action</th>
      <td mat-cell *matCellDef="let l">{{ l.action_type }}</td>
    </ng-container>
    <ng-container matColumnDef="entity_type">
      <th mat-header-cell *matHeaderCellDef>Entity</th>
      <td mat-cell *matCellDef="let l">{{ l.entity_type }}</td>
    </ng-container>
    <ng-container matColumnDef="details">
      <th mat-header-cell *matHeaderCellDef>Details</th>
      <td mat-cell *matCellDef="let l">
        <button mat-button (click)="viewLog(l)">View diff</button>
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="['created_at', 'actor', 'action_type', 'entity_type', 'details']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['created_at', 'actor', 'action_type', 'entity_type', 'details'];"></tr>
  </table>

  <div class="diff" *ngIf="selectedLog">
    <h3>Before</h3>
    <pre>{{ selectedLog.before_data | json }}</pre>
    <h3>After</h3>
    <pre>{{ selectedLog.after_data | json }}</pre>
  </div>
</div>
